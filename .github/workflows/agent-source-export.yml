name: Agent source export

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  export-source:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Create tracked-source archive
        run: git archive --format=zip --output=slackpad-source.zip HEAD

      - name: Upload source archive
        uses: actions/upload-artifact@v4
        with:
          name: slackpad-source
          path: slackpad-source.zip
          if-no-files-found: error
          retention-days: 1
